services:
  - type: web
    name: fancystore
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: fancystore-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_DB_PATH
        value: /opt/render/project/src/data/fancystore.db
      - key: JWT_SECRET
        generateValue: true
      # Optional email notifications. Add these in the Render Dashboard if needed.
      # - key: ADMIN_EMAIL
      #   sync: false
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: 587
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: FROM_EMAIL
      #   sync: false
